<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>新人教育訓練成績查詢平台</title>
  <style>
    :root {
      --bg: #f2ede3;
      --panel: rgba(255, 253, 248, 0.96);
      --ink: #1f2937;
      --muted: #6b7280;
      --line: #ddd3c4;
      --accent: #0f766e;
      --accent-soft: #ecfdf5;
      --shadow: 0 16px 36px rgba(69, 52, 27, 0.08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Noto Sans TC", sans-serif;
      color: var(--ink);
      background:
        radial-gradient(circle at top left, rgba(255, 240, 201, 0.85) 0%, transparent 24%),
        linear-gradient(180deg, #f7f2e9 0%, var(--bg) 100%);
    }
    .wrap {
      max-width: 1400px;
      margin: 0 auto;
      padding: 28px 20px 56px;
    }
    .hero,
    .title-section,
    .all-list-section,
    .loading,
    .error-panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: var(--shadow);
    }
    .hero {
      padding: 24px;
      margin-bottom: 22px;
    }
    .hero h1 {
      margin: 0 0 8px;
      font-size: 34px;
    }
    .hero p {
      margin: 0;
      color: var(--muted);
      line-height: 1.7;
    }
    .stats {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 12px;
      margin-top: 18px;
    }
    .stat {
      background: #faf7f0;
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 14px 16px;
    }
    .stat .label {
      display: block;
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 6px;
    }
    .stat .value {
      display: block;
      font-size: 28px;
      font-weight: 700;
    }
    .toolbar {
      margin-top: 18px;
    }
    .toolbar input {
      width: min(460px, 100%);
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 999px;
      background: #fff;
      font-size: 15px;
    }
    .section-note {
      margin-top: 14px;
      color: var(--muted);
      font-size: 14px;
    }
    .title-section,
    .all-list-section {
      margin-top: 20px;
      overflow: hidden;
    }
    .section-head {
      padding: 20px 22px 14px;
      border-bottom: 1px solid var(--line);
      background: linear-gradient(180deg, #fffefb, #f8f5ee);
    }
    .section-head h2 {
      margin: 0 0 4px;
      font-size: 26px;
      color: var(--accent);
    }
    .section-head p {
      margin: 0;
      color: var(--muted);
    }
    .list-wrap {
      overflow: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 760px;
    }
    th, td {
      padding: 12px 14px;
      text-align: left;
      vertical-align: top;
      border-bottom: 1px solid var(--line);
      font-size: 14px;
    }
    th {
      position: sticky;
      top: 0;
      background: #fbf8f2;
      z-index: 1;
    }
    .name-cell {
      font-weight: 700;
      background: var(--accent-soft);
      min-width: 160px;
    }
    .name-cell.repeated {
      background: #f9f7f2;
    }
    .satisfaction-cell {
      width: 110px;
      text-align: center;
    }
    .checkmark {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 26px;
      height: 26px;
      border-radius: 999px;
      background: #0f766e;
      color: white;
      font-weight: 700;
    }
    .loading,
    .error-panel {
      padding: 20px 22px;
      color: var(--muted);
    }
    .hidden {
      display: none !important;
    }
    @media (max-width: 720px) {
      .hero h1 {
        font-size: 28px;
      }
      th, td {
        font-size: 13px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <section class="hero">
      <h1>新人教育訓練成績查詢平台</h1>
      <p id="generatedAt">資料載入中...</p>
      <div class="stats">
        <div class="stat">
          <span class="label">總筆數</span>
          <span class="value" id="rowCount">-</span>
        </div>
        <div class="stat">
          <span class="label">課程標題數</span>
          <span class="value" id="titleCount">-</span>
        </div>
        <div class="stat">
          <span class="label">人員數</span>
          <span class="value" id="peopleCount">-</span>
        </div>
      </div>
      <div class="toolbar">
        <input id="searchBox" type="text" placeholder="搜尋姓名、單位、分數、標題">
      </div>
      <div class="section-note">首頁會先顯示全部人員名單；輸入搜尋關鍵字後，會改成依標題分類顯示結果。</div>
    </section>

    <section id="loadingPanel" class="loading">正在載入靜態資料...</section>
    <section id="errorPanel" class="error-panel hidden"></section>

    <section id="allListSection" class="all-list-section hidden">
      <div class="section-head">
        <div>
          <h2>全部人員名單</h2>
          <p id="allPeopleCount">0 人</p>
        </div>
      </div>
      <div class="list-wrap">
        <table>
          <thead>
            <tr>
              <th>姓名</th>
              <th>單位</th>
            </tr>
          </thead>
          <tbody id="allPeopleBody"></tbody>
        </table>
      </div>
    </section>

    <div id="groupedResults" class="hidden"></div>
  </div>

  <template id="titleSectionTemplate">
    <section class="title-section">
      <div class="section-head">
        <div>
          <h2 class="title-text"></h2>
          <p class="title-meta"></p>
        </div>
      </div>
      <div class="list-wrap">
        <table>
          <thead>
            <tr>
              <th>姓名</th>
              <th>分數</th>
              <th>單位</th>
              <th>滿意度</th>
            </tr>
          </thead>
          <tbody></tbody>
        </table>
      </div>
    </section>
  </template>

  <script src="./data/report-data.js"></script>
  <script>
    const state = {
      payload: null,
      sections: [],
    };

    const generatedAtEl = document.getElementById("generatedAt");
    const rowCountEl = document.getElementById("rowCount");
    const titleCountEl = document.getElementById("titleCount");
    const peopleCountEl = document.getElementById("peopleCount");
    const allPeopleCountEl = document.getElementById("allPeopleCount");
    const allPeopleBody = document.getElementById("allPeopleBody");
    const searchBox = document.getElementById("searchBox");
    const allListSection = document.getElementById("allListSection");
    const groupedResults = document.getElementById("groupedResults");
    const loadingPanel = document.getElementById("loadingPanel");
    const errorPanel = document.getElementById("errorPanel");
    const titleSectionTemplate = document.getElementById("titleSectionTemplate");

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function normalizeText(value) {
      return String(value ?? "").trim().toLowerCase();
    }

    function renderAllPeople(allPeople) {
      allPeopleBody.innerHTML = allPeople.map((person) => `
        <tr>
          <td>${escapeHtml(person.employee_name)}</td>
          <td>${escapeHtml(person.unit_name)}</td>
        </tr>
      `).join("");
      allPeopleCountEl.textContent = `${allPeople.length} 人`;
    }

    function renderTitleSections(titleSections) {
      groupedResults.innerHTML = "";
      state.sections = [];

      for (const sectionData of titleSections) {
        const fragment = titleSectionTemplate.content.cloneNode(true);
        const sectionEl = fragment.querySelector(".title-section");
        const titleTextEl = fragment.querySelector(".title-text");
        const titleMetaEl = fragment.querySelector(".title-meta");
        const tbody = fragment.querySelector("tbody");

        titleTextEl.textContent = sectionData.file_title || "";
        titleMetaEl.textContent = `${sectionData.unique_people_count} 人，${sectionData.row_count} 筆`;
        sectionEl.dataset.title = normalizeText(sectionData.file_title);

        let currentName = null;
        const rowsHtml = sectionData.items.map((item) => {
          const showName = item.employee_name !== currentName;
          currentName = item.employee_name;
          const rowSearchText = normalizeText([
            sectionData.file_title,
            item.employee_name,
            item.unit_name,
            item.score_text,
            item.email,
          ].join(" "));

          return `
            <tr data-search="${escapeHtml(rowSearchText)}">
              <td class="name-cell ${showName ? "" : "repeated"}">${showName ? escapeHtml(item.employee_name) : ""}</td>
              <td>${escapeHtml(item.score_text)}</td>
              <td>${escapeHtml(item.unit_name)}</td>
              <td class="satisfaction-cell">${item.has_satisfaction ? '<span class="checkmark">✓</span>' : ""}</td>
            </tr>
          `;
        }).join("");

        tbody.innerHTML = rowsHtml;
        groupedResults.appendChild(fragment);
      }

      state.sections = [...document.querySelectorAll(".title-section")];
    }

    function applyFilter() {
      const keyword = normalizeText(searchBox.value);

      if (!keyword) {
        allListSection.classList.remove("hidden");
        groupedResults.classList.add("hidden");
        for (const section of state.sections) {
          section.classList.remove("hidden");
          for (const row of section.querySelectorAll("tbody tr")) {
            row.classList.remove("hidden");
          }
        }
        return;
      }

      allListSection.classList.add("hidden");
      groupedResults.classList.remove("hidden");

      for (const section of state.sections) {
        const titleMatched = (section.dataset.title || "").includes(keyword);
        const rows = [...section.querySelectorAll("tbody tr")];
        let visibleRowCount = 0;

        for (const row of rows) {
          const matched = titleMatched || (row.dataset.search || "").includes(keyword);
          row.classList.toggle("hidden", !matched);
          if (matched) {
            visibleRowCount += 1;
          }
        }

        section.classList.toggle("hidden", visibleRowCount === 0 && !titleMatched);
      }
    }

    function applyPayload(payload) {
      state.payload = payload;

      generatedAtEl.textContent = `資料更新時間：${payload.generated_at}`;
      rowCountEl.textContent = payload.stats.row_count;
      titleCountEl.textContent = payload.stats.title_count;
      peopleCountEl.textContent = payload.stats.people_count;

      renderAllPeople(payload.all_people || []);
      renderTitleSections(payload.title_sections || []);

      loadingPanel.classList.add("hidden");
      errorPanel.classList.add("hidden");
      allListSection.classList.remove("hidden");
      groupedResults.classList.add("hidden");
    }

    async function loadData() {
      try {
        if (window.STATIC_REPORT_DATA) {
          applyPayload(window.STATIC_REPORT_DATA);
          return;
        }

        const response = await fetch("./data/report-data.json", { cache: "no-store" });
        if (!response.ok) {
          throw new Error(`資料讀取失敗：HTTP ${response.status}`);
        }

        const payload = await response.json();
        applyPayload(payload);
      } catch (error) {
        loadingPanel.classList.add("hidden");
        errorPanel.classList.remove("hidden");
        errorPanel.textContent = `${error.message}。請確認已一併部署 data/report-data.js 或 data/report-data.json。`;
      }
    }

    searchBox.addEventListener("input", applyFilter);
    loadData();
  </script>
</body>
</html>
